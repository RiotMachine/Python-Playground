<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
            rel="stylesheet" 
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" 
            crossorigin="anonymous">
        <title>
            JJ's Ticketing System
        </title>
    </head>
    <body>
        <div class="container">
            <div class="row">
                <div class="col text-center">
                    <h1>
                        Jacob's Ticketing System
                    </h1>
                    {% with flashes = get_flashed_messages() %}
                    {% if flashes %}
                    {% for flash in flashes %}
                        <h3>
                            {{ flash }}
                        </h3>
                    {% endfor %}
                    {% endif %}
                    {% endwith %}
                </div>
            </div>
            <div class="row justify-content-center mb-3">
                <div class="col-10">
                    <form method="POST">
                        <label for="email" class="form-label">
                            Email address
                        </label>
                        <input type="email" class="form-control mb-3" id="email" name ="email" required>

                        <label for="category" class="form-label">
                            Issue category
                        </label>
                        <select class="form-select mb-3" id="category" name="category" required>
                            {% for category in categories %}
                            <option value="{{category}}">
                                {{ category }}
                            </option>
                            {% endfor %}
                        </select>

                        <label for="freetext" class="form-label" >
                            Describe your issue
                        </label>
                        <textarea class="form-control" id="freetext" 
                            name="freetext" rows="3" required></textarea>
                </div>
            </div>
            <div class="row justify-content-center">
                <div class="col-10 text-center">
                        <button type="submit" class="btn btn-primary">
                            Submit
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
            crossorigin="anonymous">
        </script>
    </body>
</html>
